<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monarch — Fine Dining Thalawatugoda</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --gold-light: #E8C97A; --obsidian: #0A0A0A;
    --charcoal: #141414; --slate: #1E1E1E; --smoke: #2A2A2A;
    --ivory: #F5F0E8; --cream: #EDE7D9; --muted: #888070;
    --glass: rgba(255,255,255,0.04); --glass-border: rgba(201,168,76,0.2);
  }
  html, body { width: 100%; height: 100%; font-family: 'Jost', sans-serif; background: var(--obsidian); color: var(--ivory); overflow: hidden; }
  .bg-pattern { position: fixed; inset: 0; z-index: 0; background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.08) 0%, transparent 60%), repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(201,168,76,0.015) 40px, rgba(201,168,76,0.015) 41px); }
  .app { position: relative; z-index: 1; width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; background: var(--charcoal); border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border); margin: 0 auto; box-shadow: 0 0 80px rgba(0,0,0,0.8); }
  .header { padding: 20px 24px 16px; border-bottom: 1px solid var(--glass-border); background: linear-gradient(180deg, rgba(201,168,76,0.06) 0%, transparent 100%); display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .crown-wrap { width: 44px; height: 44px; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
  .crown-wrap::before { content: '♛'; font-size: 22px; color: var(--gold); line-height: 1; }
  .crown-halo { position: absolute; inset: -5px; border: 1px solid rgba(201,168,76,0.12); }
  .header-text h1 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; letter-spacing: 0.14em; color: var(--gold-light); text-transform: uppercase; line-height: 1.1; }
  .header-text p { font-size: 10px; font-weight: 300; letter-spacing: 0.22em; color: var(--muted); text-transform: uppercase; margin-top: 3px; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 300; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; box-shadow: 0 0 6px #4CAF50; animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .pills { padding: 12px 20px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid rgba(201,168,76,0.08); flex-shrink: 0; }
  .pill { font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 300; letter-spacing: 0.1em; padding: 7px 15px; border: 1px solid var(--glass-border); background: var(--glass); color: var(--cream); cursor: pointer; text-transform: uppercase; transition: all 0.2s ease; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .pill:hover, .pill:active { background: rgba(201,168,76,0.12); border-color: var(--gold); color: var(--gold-light); }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 2px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 1px; }
  .msg { display: flex; gap: 10px; animation: fadein 0.3s ease forwards; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .avatar { width: 32px; height: 32px; border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; font-family: 'Cormorant Garamond', serif; color: var(--gold); background: var(--slate); align-self: flex-end; }
  .msg.user .avatar { font-family: 'Jost', sans-serif; font-size: 9px; letter-spacing: 0.05em; border-color: rgba(201,168,76,0.4); color: var(--gold-light); }
  .bubble { max-width: 80%; padding: 11px 15px; font-size: 13.5px; line-height: 1.65; font-weight: 300; }
  .bot .bubble { background: var(--slate); border: 1px solid rgba(201,168,76,0.1); border-radius: 1px 12px 12px 1px; color: var(--cream); }
  .msg.user .bubble { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.28); border-radius: 12px 1px 1px 12px; color: var(--ivory); text-align: right; }
  .bubble strong { color: var(--gold-light); font-weight: 500; }
  .menu-btns { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .menu-btn { width: 100%; padding: 10px 14px; background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.2); color: var(--cream); font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 300; letter-spacing: 0.07em; text-align: left; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; -webkit-tap-highlight-color: transparent; }
  .menu-btn:hover, .menu-btn:active { background: rgba(201,168,76,0.14); border-color: var(--gold); color: var(--gold-light); }
  .menu-btn .price { font-size: 11px; color: var(--gold); font-weight: 400; }
  .typing { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
  .typing span { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; opacity: 0.4; animation: bounce 1.2s ease-in-out infinite; }
  .typing span:nth-child(2){animation-delay:0.15s} .typing span:nth-child(3){animation-delay:0.3s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }
  .divider { display: flex; align-items: center; gap: 10px; font-size: 9px; letter-spacing: 0.22em; color: var(--muted); text-transform: uppercase; margin: 2px 0; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(201,168,76,0.12); }
  .input-area { padding: 14px 20px 18px; border-top: 1px solid var(--glass-border); background: linear-gradient(0deg, rgba(201,168,76,0.04) 0%, transparent 100%); flex-shrink: 0; }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; background: var(--slate); border: 1px solid rgba(201,168,76,0.2); color: var(--ivory); font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 300; padding: 11px 14px; resize: none; outline: none; min-height: 44px; max-height: 100px; line-height: 1.5; border-radius: 2px; transition: border-color 0.2s; display: block; width: 100%; -webkit-appearance: none; }
  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: rgba(201,168,76,0.5); }
  .send-btn { width: 44px; height: 44px; background: var(--gold); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; border-radius: 2px; -webkit-tap-highlight-color: transparent; }
  .send-btn:hover { background: var(--gold-light); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { background: var(--smoke); cursor: not-allowed; }
  .send-btn svg { width: 15px; height: 15px; fill: var(--obsidian); }
  .footer-note { margin-top: 8px; text-align: center; font-size: 9px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
  .footer-note span { color: rgba(201,168,76,0.5); }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="app">
  <div class="header">
    <div class="crown-wrap"><div class="crown-halo"></div></div>
    <div class="header-text">
      <h1 id="restaurant-name">Monarch</h1>
      <p id="restaurant-tagline">Thalawatugoda &middot; Fine Dining</p>
    </div>
    <div class="status"><div class="dot"></div>Live</div>
  </div>
  <div class="pills" id="pills-container"></div>
  <div class="messages" id="messages">
    <div class="divider">Welcome</div>
    <div class="msg bot">
      <div class="avatar">♛</div>
      <div class="bubble">
        Good evening. Welcome to <strong id="welcome-name">Monarch</strong>.<br><br>
        I am your personal dining concierge. How may I assist you today?
        <div class="menu-btns">
          <button class="menu-btn" onclick="quickAsk('What dishes do you recommend tonight?')"><span>✦ Tonight's recommendations</span><span>→</span></button>
          <button class="menu-btn" onclick="showFullMenu()"><span>✦ View our full menu</span><span>→</span></button>
          <button class="menu-btn" onclick="quickAsk('I would like to make a reservation')"><span>✦ Reserve a table</span><span>→</span></button>
        </div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="Ask about our menu, reservations, or anything..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2 12L22 2L16 22L11 13L2 12Z"/></svg>
      </button>
    </div>
    <div class="footer-note">Secured by <span>Monarch AI</span> &middot; Your conversation is private</div>
  </div>
</div>
<script>
const RESTAURANT_CONFIG = {
  name: "Monarch",
  location: "Thalawatugoda, Sri Lanka",
  tagline: "Fine Dining",
  primaryColor: "#C9A84C",
  backgroundColor: "#0A0A0A",
  menu: [
    { name: "Chicken Kottu", price: "Rs. 650", desc: "Sri Lanka's beloved street classic reimagined. Chopped roti stir-fried with tender spiced chicken, egg, leeks, and aromatic spices." },
    { name: "Fried Rice", price: "Rs. 550", desc: "Fragrant long-grain rice wok-tossed with seasonal vegetables, egg, and our house soy blend." },
    { name: "Roti", price: "Rs. 280", desc: "Soft handmade flatbreads served warm with coconut sambol and dhal." },
    { name: "Rice & Curry", price: "Rs. 700", desc: "Authentic Sri Lankan spread — steamed rice with rotating curries, papadums, pickles, and chutneys." }
  ],
  quickButtons: [
    { label: "Our Menu", message: "Show me the full menu" },
    { label: "Order", message: "How do I place an order?" },
    { label: "About", message: "Tell me about this restaurant" },
    { label: "Visit Us", message: "What are your opening hours and where are you located?" }
  ]
};
document.getElementById('restaurant-name').textContent = RESTAURANT_CONFIG.name;
document.getElementById('welcome-name').textContent = RESTAURANT_CONFIG.name;
document.getElementById('restaurant-tagline').textContent = RESTAURANT_CONFIG.location + ' · ' + RESTAURANT_CONFIG.tagline;
document.title = RESTAURANT_CONFIG.name + ' — ' + RESTAURANT_CONFIG.tagline;
const pillsContainer = document.getElementById('pills-container');
RESTAURANT_CONFIG.quickButtons.forEach(btn => {
  const el = document.createElement('button');
  el.className = 'pill'; el.textContent = btn.label;
  el.onclick = () => quickAsk(btn.message);
  pillsContainer.appendChild(el);
});
let history = []; let busy = false;
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function quickAsk(text) { document.getElementById('userInput').value = text; sendMessage(); }
function esc(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function addBubble(role, html) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div'); div.className = 'msg ' + role;
  const label = role === 'user' ? '<div class="avatar">YOU</div>' : '<div class="avatar">&#9819;</div>';
  div.innerHTML = label + '<div class="bubble">' + html + '</div>';
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div'); div.className = 'msg bot'; div.id = 'typer';
  div.innerHTML = '<div class="avatar">&#9819;</div><div class="bubble" style="padding:14px 16px"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typer'); if(t) t.remove(); }
function showFullMenu() {
  addBubble('user', 'View our full menu');
  history.push({ role: 'user', content: 'Show me the full menu' });
  let html = 'A pleasure to present our menu:<div class="menu-btns" style="margin-top:10px">';
  RESTAURANT_CONFIG.menu.forEach(item => {
    html += `<button class="menu-btn" onclick="quickAsk('Tell me more about ${item.name}')"><span>✦ ${item.name}</span><span class="price">${item.price}</span></button>`;
  });
  html += '</div><br>Tap any dish to learn more.';
  history.push({ role: 'assistant', content: 'Presenting the full menu.' });
  addBubble('bot', html);
}
async function sendMessage() {
  if (busy) return;
  const inp = document.getElementById('userInput');
  const text = inp.value.trim(); if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  busy = true; document.getElementById('sendBtn').disabled = true;
  addBubble('user', esc(text));
  history.push({ role: 'user', content: text });
  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, restaurantConfig: { name: RESTAURANT_CONFIG.name, location: RESTAURANT_CONFIG.location, menu: RESTAURANT_CONFIG.menu } })
    });
    const data = await res.json(); removeTyping();
    if (data.reply) {
      history.push({ role: 'assistant', content: data.reply });
      const fmt = data.reply.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
      addBubble('bot', fmt);
    } else { addBubble('bot', 'I do apologize — I seem to be momentarily unavailable. Please try again shortly.'); }
  } catch(err) { removeTyping(); addBubble('bot', 'My sincerest apologies — a connectivity issue occurred. Please try again.'); }
  busy = false; document.getElementById('sendBtn').disabled = false; inp.focus();
}
</script>
</body>
</html>
